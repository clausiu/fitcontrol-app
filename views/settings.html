<div class="stat-card" style="max-width: 500px; margin: 40px auto; display: block;">
    <h2 style="margin-bottom: 24px; border-bottom: 1px solid var(--border-color); padding-bottom: 12px;">Securitate Cont Admin</h2>
    <form id="settingsForm">
        <div class="form-group">
            <label>Noua Parolă</label>
            <input type="password" name="new_password" id="new_password" required placeholder="Introduceți o parolă puternică">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn-primary" style="width: 100%; justify-content: center;">Salvează Parola</button>
        </div>
    </form>
</div>
