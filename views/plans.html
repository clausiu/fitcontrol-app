
<div class="table-container">
    <div class="table-header" style="display: flex; gap: 16px; justify-content: space-between;">

            <i class="fa-solid fa-plus"></i> Abonament Nou
        </button>
    </div>
    <table>
        <thead>
            <tr>
                <th>Nume Abonament</th>
                <th>Preț (RON)</th>
                <th>Durată (Zile)</th>
                <th>Membri Activi (Aprox)</th>
                <th>Acțiuni</th>
            </tr>
        </thead>
        <tbody>
                        <tr>
                <td style="font-weight: 500;">Basic - 1 Lună</td>
                <td>150.00 RON</td>
                <td>30 Zile</td>
                <td><span class="status active" style="border-radius: 4px; padding: 2px 8px;">16</span></td>
                <td>
                    <!-- O simplă alertă de placeholder pt stergere, ar trebui un API real -->
                    <button class="btn-text text-danger" onclick="alert('Funcționalitate de ștergere/editare abonament în lucru!');"><i class="fa-solid fa-trash"></i> Șterge</button>
                </td>
            </tr>
                        <tr>
                <td style="font-weight: 500;">Premium - 3 Luni</td>
                <td>400.00 RON</td>
                <td>90 Zile</td>
                <td><span class="status active" style="border-radius: 4px; padding: 2px 8px;">16</span></td>
                <td>
                    <!-- O simplă alertă de placeholder pt stergere, ar trebui un API real -->
                    <button class="btn-text text-danger" onclick="alert('Funcționalitate de ștergere/editare abonament în lucru!');"><i class="fa-solid fa-trash"></i> Șterge</button>
                </td>
            </tr>
                        <tr>
                <td style="font-weight: 500;">VIP - 12 Luni</td>
                <td>1,200.00 RON</td>
                <td>365 Zile</td>
                <td><span class="status active" style="border-radius: 4px; padding: 2px 8px;">13</span></td>
                <td>
                    <!-- O simplă alertă de placeholder pt stergere, ar trebui un API real -->
                    <button class="btn-text text-danger" onclick="alert('Funcționalitate de ștergere/editare abonament în lucru!');"><i class="fa-solid fa-trash"></i> Șterge</button>
                </td>
            </tr>
                    </tbody>
    </table>
</div>

<div class="modal-overlay" id="addPlanModal">
    <div class="modal">
        <div class="modal-header">
            <h2>Adaugă Abonament</h2>
            <button class="close-modal" id="closePlanModalBtn">&times;</button>
        </div>
        <div class="modal-body">
            <form id="addPlanForm">
                <div class="form-group">
                    <label>Nume Abonament</label>
                    <input type="text" name="name" required placeholder="Ex: Crossfit Lunar">
                </div>
                <div class="form-group">
                    <label>Preț (RON)</label>
                    <input type="number" step="0.01" name="price" required placeholder="Ex: 250">
                </div>
                <div class="form-group">
                    <label>Durată (Zile)</label>
                    <input type="number" name="duration_days" required placeholder="Ex: 30">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" id="cancelPlanModalBtn">Renunță</button>
                    <button type="submit" class="btn-primary">Salvează</button>
                </div>
            </form>
        </div>
    </div>
</div>
